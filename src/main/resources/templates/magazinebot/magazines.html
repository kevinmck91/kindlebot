<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Available Magazines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <style>
        .link-button {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            color: #0d6efd;
            text-decoration: underline;
            cursor: pointer;
            font: inherit;
        }
        .link-button:hover {
            color: #0a58ca;
        }
        .item {
            padding: 1rem;
            border: 1px solid #dee2e6;
            border-radius: .5rem;
            margin-bottom: 1rem;
            background: #ffffff;
        }
        .item .item-meta {
            color: #6c757d;
            font-size: .9rem;
            margin-top: .25rem;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .breadcrumb-nav {
            margin-bottom: 2rem;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4">Available Magazines</h1>
        
        <div class="loading" id="loading">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Loading...</p>
        </div>

        <div class="step active" id="step-0">

			<div th:if="${githubItems == null or #lists.isEmpty(githubItems)}"
				class="alert alert-info">No data available.
			</div>

			<div th:each="item : ${githubItems}" class="item">

				<form th:action="@{/magazinebot/magazine/years}" method="post">
					<input type="hidden" name="name" th:value="${item.name}" /> 
					<input type="hidden" name="url" th:value="${item.url}" />
					<button type="submit" class="link-button magazine-btn"	th:text="${item.description}">Open magazine</button>
				</form>

				<div class="item-meta">
					<span th:text="'Name: ' + ${item.name}"></span> <span
						th:text="' | URL: ' + ${item.url}"></span>
				</div>

			</div>
		</div>

</body>
</html>
